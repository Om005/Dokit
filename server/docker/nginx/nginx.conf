events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS - resolves container names dynamically at request time
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location ~* ^/terminal/(?<project_id>[^/]+)(?<suffix>/.*)?$ {
            auth_request /internal-terminal-check;
            auth_request_set $auth_status $upstream_status;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;

            set $target "dokit-$project_id";
            set $proxy_suffix $suffix;
            if ($proxy_suffix = "") {
                set $proxy_suffix /;
            }

            proxy_pass http://$target:7681$proxy_suffix;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /internal-terminal-check {
            internal; 
            
            proxy_pass http://10.104.56.78:4000/api/project/access/verify-terminal;
            
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location / {
            return 404 "Not Found";
        }
    }

    server {
        listen 80;
        server_name ~^(?<port>\d+)-(?<project_id>[a-zA-Z0-9-]+)\.[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\.nip\.io$;

        location = /preview-auth {
            proxy_pass http://10.104.56.78:4000/api/project/access/preview-auth;
            proxy_set_header X-Original-Host $host;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Step 2: all other requests — cookie auth only
        location / {
            auth_request /internal-preview-check;
            auth_request_set $auth_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $auth_cookie always;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            set $target "dokit-$project_id";
            proxy_pass http://$target:$port;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            error_page 502 = @bad_gateway;
        }

        location = /internal-preview-check {
            internal;
            proxy_pass http://10.104.56.78:4000/api/project/access/verify-preview;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location @bad_gateway {
            default_type text/html;
            return 502 "<html><body style='background:#111827;color:#9CA3AF;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;'><div><h2>Waiting for port $port...</h2><p>Did you start your server?</p></div><script>setTimeout(() => location.reload(), 2000)</script></body></html>";
        }
    }
}