events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS - resolves container names dynamically at request time
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location ~* ^/terminal/(?<project_id>[^/]+)(?<suffix>/.*)?$ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;

            set $target "dokit-$project_id";
            set $proxy_suffix $suffix;
            if ($proxy_suffix = "") {
                set $proxy_suffix /;
            }

            proxy_pass http://$target:7681$proxy_suffix;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404 "Not Found";
        }
    }

    server {
        listen 80;
        
        server_name ~^(?<port>\d+)-(?<project_id>[a-zA-Z0-9-]+)\.[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\.nip\.io$;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            set $target "dokit-$project_id";

            proxy_pass http://$target:$port;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_intercept_errors on;
            error_page 502 = @bad_gateway;
        }
        
        location @bad_gateway {
            default_type text/html;
            return 502 "<html><body style='background:#111827;color:#9CA3AF;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;'><div><h2>Waiting for port $port...</h2><p>Did you start your server?</p></div><script>setTimeout(() => location.reload(), 2000)</script></body></html>";
        }
    }
}